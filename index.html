<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物品返却カメラ | 沼津高専</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 20px; }
        #wrapper { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        video { width: 100%; border-radius: 10px; background: #000; }
        #canvas { display: none; }
        #return-btn { 
            display: none; width: 100%; padding: 20px; font-size: 1.8rem; margin-top: 20px;
            color: white; background: #e67e22; border: none; border-radius: 15px; cursor: pointer;
        }
        #status { margin-top: 15px; font-size: 1.2rem; font-weight: bold; min-height: 1.5em; }
    </style>
</head>
<body>

<div id="wrapper">
    <h1>📦 物品返却スキャン</h1>
    <p>枠内にQRコードを映してください</p>
    
    <video id="video" playsinline></video>
    <canvas id="canvas"></canvas>

    <div id="status">カメラ起動中...</div>
    
    <button id="return-btn" onclick="confirmReturn()">返却を確定する</button>
</div>

<script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const status = document.getElementById("status");
    const btn = document.getElementById("return-btn");
    let currentId = "";

    // カメラを起動する
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => {
        video.srcObject = stream;
        video.setAttribute("playsinline", true);
        video.play();
        requestAnimationFrame(tick);
    });

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.height = video.videoHeight;
            canvas.width = video.videoWidth;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

            if (code && !currentId) {
                // Formsの長いパラメーター（re...=）の後の値を抜き出す
                const match = code.data.match(/[?&]re[a-z0-9]+=([A-Z0-9-]+)/i);
                
                if (match) {
                    currentId = match[1]; // これで VR001 などのIDが取れる！
                    status.innerText = `読み取り成功: ${currentId}`;
                    status.style.color = "#3498db";
                    btn.style.display = "block";
                    if (navigator.vibrate) navigator.vibrate(200);
                } else if (code.data.includes("forms.office.com")) {
                    // URLはFormsだけど、IDが末尾についていない場合
                    status.innerText = "❌ IDが含まれていないQRです";
                    status.style.color = "red";
                }
            }
        }
        if (!currentId) requestAnimationFrame(tick);
    }

    async function confirmReturn() {
        const webhookUrl = "https://default72fe835d5e9545128ae0a7b38af25f.c8.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/fc697f8382ea4d48a06ddc3d97863f47/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=Gf4y2WX0WdiBcTuGQ9Mo4GrKPAATiC5g4JiSuzn_rks";
        status.innerText = `⏳ ${currentId} を処理中...`;

        try {
            const response = await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ item_id: currentId })
            });

            if (response.ok) {
                status.innerText = `✅ ${currentId} 返却完了！`;
                status.style.color = "#27ae60";
                btn.style.display = "none";
                setTimeout(resetScanner, 3000);
            } else { throw new Error(); }
        } catch (e) {
            status.innerText = "⚠️ エラー。ネットを確認してね";
            status.style.color = "red";
            setTimeout(resetScanner, 3000);
        }
    }

    function resetScanner() {
        currentId = "";
        status.innerText = "スキャン待機中...";
        status.style.color = "black";
        requestAnimationFrame(tick);
    }
</script>

</body>
</html>
